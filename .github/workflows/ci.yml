name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-gateway:ci .

      - name: Smoke test the image
        run: |
          docker run -d --name gw -p 8080:8080 -e PROVIDER_ORDER=mock llm-gateway:ci
          for i in $(seq 1 15); do
            if wget -q -O- http://localhost:8080/health; then echo "healthy"; exit 0; fi
            sleep 1
          done
          echo "health check failed"; docker logs gw; exit 1

